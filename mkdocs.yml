site_name: EPYC Local-Inference
site_description: CPU-only local LLM inference on AMD EPYC 9655 — research, methods, and production stack
site_url: https://pestopoppa.github.io/epyc-root/
repo_url: https://github.com/pestopoppa/epyc-root
repo_name: pestopoppa/epyc-root
edit_uri: ""

docs_dir: site_src

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - awesome-pages

nav:
  - Home: index.md
  - Stories:
    - stories/index.md
    - How a request flows through the stack: stories/how-a-request-flows.md
    - Why CPU-only inference is viable on EPYC: stories/why-cpu-inference.md
    - 'Worker_general: 17 → 76 t/s': stories/worker-general-story.md
    - The autonomous research loop: stories/autonomous-research-loop.md
    - The speculative decoding investigation: stories/spec-decoding-investigation.md
    - What we're investigating now: stories/investigating-now.md
    - What we tried and ruled out: stories/ruled-out.md
  - Topics:
    - topics/index.md
    - Speculative Decoding: topics/speculative-decoding.md
    - MoE Optimization: topics/moe-optimization.md
    - KV Cache: topics/kv-cache.md
    - Quantization: topics/quantization.md
    - Hardware Optimization: topics/hardware-optimization.md
    - Inference Serving: topics/inference-serving.md
