    - Routing Intelligence: topics/routing-intelligence.md
    - Benchmark Methodology: topics/benchmark-methodology.md
    - Agent Architecture: topics/agent-architecture.md
    - Autonomous Research: topics/autonomous-research.md
    - Memory-Augmented Models: topics/memory-augmented.md
    - Context Management: topics/context-management.md
    - Context Extension: topics/context-extension.md
    - SSM & Hybrid Architectures: topics/ssm-hybrid.md
    - Training & Distillation: topics/training-distillation.md
    - Reinforcement Learning: topics/reinforcement-learning.md
    - Multimodal: topics/multimodal.md
    - Document Processing: topics/document-processing.md
    - Formal Verification: topics/formal-verification.md
    - Search & Retrieval: topics/search-retrieval.md
    - Knowledge Management: topics/knowledge-management.md
    - RAG Alternatives: topics/rag-alternatives.md
    - Tool Implementation: topics/tool-implementation.md
    - LLM Prompting: topics/llm-prompting.md
    - Mechanistic Interpretability: topics/mechanistic-interpretability.md
