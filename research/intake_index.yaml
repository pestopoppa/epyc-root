    positions, architectural not learned). This is orthogonal to our KV cache
    quantization work (Hadamard+q4_0) and could compose with it: Memento 2-3x ×
    q4_0 2x = 4-6x KV reduction. Key opportunity: pass@64 Jaccard 96.4% means gap
