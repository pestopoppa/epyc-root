    - intake-?  # RouteLLM (arxiv:2406.18665) — peer binary routing
    - intake-?  # Router-R1 (arxiv:2506.09033) — peer multi-round RL routing
    experiments: []
  handoffs_updated:
  - decision-aware-routing.md
  - learned-routing-controller.md
  handoffs_created: []
  novelty_justification: >
    HIGH. Three orthogonal contributions vs prior intake (xRouter / RouteLLM /
    Router-R1, all RL-based binary or end-to-end routers): (1) sep-CMA-ES
    instead of RL/SFT for training the coordinator — an evolutionary-strategies
    branch that the existing intake corpus does not cover for routing; (2)
    multi-turn role-typed delegation (Thinker/Worker/Verifier over the SAME
    agent pool) rather than single-shot model selection — closer to our own
    multi-role orchestrator stack than to binary RouteLLM; (3) extreme
    parameter budget (10K-parameter head over a 0.6B base LM, no SFT/RL needed)
    that fits CPU-only training and inference budgets that intake-366
    (decision-aware survey) flagged as the constraint disqualifying xRouter
    and Router-R1.
  relevance_justification: >
    HIGH. Three active handoffs already explicitly compete in this design
    space: decision-aware-routing.md tracks xRouter / RouteLLM / Router-R1
    in its Research Context table — Trinity is a fourth peer with a
    qualitatively different optimizer (ES vs RL); learned-routing-controller.md
    runs a lightweight (≈200K-parameter, numpy-only) MLP head on top of an
    embedding model — Trinity validates this lightweight-head architecture at
    a slightly larger scale (0.6B LM + 10K head) and demonstrates that ES
    training is viable when distillation labels are not available;
    routing-intelligence.md is the umbrella for classifier-based routing
    decisions and would benefit from the role-typed delegation pattern. CPU
    feasibility is real: sep-CMA-ES on a 10K-parameter head is well within
    EPYC's training envelope.
  verdict_justification: >
    new_opportunity. Specific opportunities, in priority order: (1) evaluate
    sep-CMA-ES as an alternative training objective for the existing
    learned-routing-controller MLP head when high-quality distillation labels
    are unavailable — directly addresses the cold-start problem flagged in
    learned-routing-controller P1; (2) extend the routing surface beyond
    single-shot model selection to role-typed multi-turn delegation
    (Thinker/Worker/Verifier) over our existing role pool — fits the
    routing-intelligence Category-A input classifier; (3) read the
    penultimate-token-logits-to-agent trick into our routing-classifier
    architecture — gives a single-forward-pass routing head that piggybacks
    on the embedding model already in use. Do NOT adopt the full Trinity
    stack uncritically — the abstract-vs-grounded-execution limitation noted
    by the authors is exactly the gap our orchestrator already addresses
    (tool-grounded execution), so the integration target is the routing /
    coordination LAYER, not the agent-execution layer.
  notes: >
    DEEP-DIVE 2026-04-26 at research/deep-dives/trinity-evolved-llm-coordinator-methodology.md
    — TREAT AS STANDING COMPARATIVE CONTEXT for all orchestrator/routing
    work. Trinity attacks the same thesis we are building around (lightweight
    learned multi-turn coordinator over a heterogeneous agent pool); even if
    our final architecture differs, Trinity is the most direct prior art and
    revisions to our routing/coordination plans should reference it. Two URLs
    supplied at intake refer to the SAME paper: arxiv:2512.04695 = preprint,
    openreview/forum?id=5HaRjXai12 = ICLR 2026 venue record. Indexed under
    arXiv URL; openreview URL recorded as alternate. Authors at Sakana AI;
    Trinity is core to Sakana's commercial Sakana-Fugu product, so OPEN CODE
    RELEASE IS UNLIKELY — replicate from paper, do not wait for github. Key
    portable pieces (priority-ranked in deep-dive): (1) tri-role action space
    Thinker/Worker/Verifier — architectural, optimizer-agnostic, single
    biggest empirical lever in their ablations; (2) sep-CMA-ES as cold-start
    trainer for routing surfaces lacking episodic labels (CPU-feasible at
    our scale, ~10h overnight at 32-way concurrency for a feasibility test);
    (3) block-ε-separability diagnostic — full-rank vs rank-10 vs diagonal
    head ablation tells us whether their geometry argument applies to us;
    (4) SVD-scale FT of backbone (~9K params, claimed +3-4 points, cheaper
    than LoRA); (5) outer-coordination-layer Trinity analogue — a learned
    head over the Claude-driven autopilot loop, not just the inner inference
    pool. NOT directly portable: penultimate-vs-final-token finding (decoder-
    specific, BGE is encoder), the 7-LLM pool with frontier closed models
    (we are open-source-only on inner pool per feedback_opensource_only),
    the 21.9% mean error-reduction headline (heterogeneous-pool-specific,
    discount 2-5× for our inner pool). Pool-homogeneity caveat needs
    layer-specific framing — inner pool is homogeneous (gain headroom is
    smaller), outer Claude-driven layer is heterogeneous (Claude vs cheap
    frontdoor vs specialist coder is wider quality gradient than Trinity's
    inner pool, closer to their regime). Phase-3 literature expansion
    skipped: immediate prior-art neighbours (xRouter / RouteLLM / Router-R1
    / BaRP / LLM Bandit) all already in index.
