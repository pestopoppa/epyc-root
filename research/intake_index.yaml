    Academic survey complementing the Chrys Bader essay (intake-316). Confirms that
    cross-session coherence, parametric-nonparametric balance, and application-level
    evaluation are genuinely unsolved. The parametric-nonparametric framing is useful:
    our context-folding is non-parametric (external memory), while Doc-to-LoRA
    (intake handoff) is parametric (baking knowledge into weights). This survey
    provides the academic foundation for our design decisions.
    DEEP-DIVE 2026-04-12: Three-dimensional taxonomy: temporal scope (working/episodic/
    semantic/procedural), representational substrate (context-resident/vector/structured/
    executable/hybrid), control policy (heuristic/prompted/learned). Five mechanism
    families: (1) context-resident compression (pathology: summarization drift after 3+
    passes — directly relevant to our context-folding), (2) retrieval-augmented stores
    (key issue: user input is poor retrieval query), (3) reflective self-improvement
    (Reflexion 91% HumanEval; risk: self-reinforcing errors), (4) hierarchical virtual
    context (MemGPT paging; achilles heel: paging wrong things), (5) policy-learned
    management (AgeMem discovers preemptive summarization via RL). CRITICAL FINDING:
    "Long context is NOT memory" — MemoryArena drops from 80%→45% with long-context-only.
    Generative Agents degenerate within 48 simulated hours without reflection. Voyager
    15.3x slower without skill library. Unsolved: continual consolidation (when do
    episodes become semantic knowledge?), causally-grounded retrieval, trustworthy
    reflection, learned forgetting, evaluation with cost. FOR EPYC: (1) MemGPT-style
    three-tier pattern (working context / recall DB / archival store) should be evaluated
    for orchestrator multi-session management. (2) The "summarization drift after 3+"
    finding directly warns about our multi-tier compression. (3) Policy-learned memory
    management (AgeMem) could be a future autopilot species target.

