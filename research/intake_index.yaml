    for EPYC: (1) 2.3-3.2x latency reduction at long contexts directly addresses
    our inference speed goals. (2) 40% parameter savings means smaller models
    for same quality — changes our model selection calculus. (3) Unlike Delta
    Net (our current hybrid architecture focus), Multiscreen preserves the
    attention paradigm but makes it sub-quadratic via key screening — potentially
    compatible with our existing KV cache and speculation infrastructure.
    (4) Training stability at high LR could enable faster fine-tuning.
    Key question: will llama.cpp support Multiscreen? No GGUF models exist yet.
    This is pre-trained research, not a deployable model family — but if adopted
    by a major model provider, it would change the inference optimization landscape.

