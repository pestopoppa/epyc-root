    - inference-acceleration-index.md
    - llama-cpp-v3-upstream-rebuild.md
  notes: >
    CRITICAL for EPYC GPU path. Expert offloading (-ot "exps=CPU") keeps attention + dense
    FFN on GPU while routing MoE experts to CPU. This is THE hybrid strategy for our stack:
    EPYC has massive CPU capacity (192 threads, 1.1TB RAM) that could handle expert compute
    while a GPU accelerates attention + dense layers. Key details: -ot uses regex tensor
    assignment, -ngl 999 offloads everything then -ot overrides specific tensors back to CPU.
    Batch sizing critical: -b 4096 -ub 4096 (our default is already well-tuned for CPU).
    NUMA considerations: numactl --interleave=all + --numa distribute for multi-socket.
    Flash attention: -fa on. For our Qwen3.5/Qwen3 MoE models (30B-A3B, 35B-A3B, 122B-A10B,
    246B REAP), attention layers are small relative to expert FFNs — ideal for GPU offload
    of attention + shared expert while CPU handles routed experts. This could combine our
    existing NUMA 4-way strategy with GPU acceleration of the compute-bound attention path.
    hipBLASLt grouped GEMM (intake-305) would further accelerate the GPU-side MoE routing.
  handoffs_updated:
