  cross_references:
    intake:
    - intake-240 (GEPA paper — same algorithm used here)
    - intake-244 (Meta-Harness — same optimization target, different approach)
    handoffs:
    - hermes-agent-index.md
    - autopilot-continuous-optimization.md
    - meta-harness-optimization.md
  notes: >
    Directly applicable to our PromptForge species in autopilot. Key differences from
    our approach: they use GEPA (evolutionary, Pareto-optimal), we use LLM-guided mutation.
    Their execution trace analysis goes beyond our score-only feedback — aligns with
    Meta-Harness finding (intake-244) that full traces provide +15 points. The $2-10 per
    run is for API models; adapting to local models would eliminate cost but require our
    inference stack. The guardrails (test validation + human review) are more conservative
    than our autopilot safety gates. Nous Research backing adds credibility. MIT license.
    Should explore integrating GEPA algorithm into our PromptForge species.
    DEEP-DIVE 2026-04-12: 6-stage optimization loop (SELECT→BUILD EVAL→WRAP DSPy→RUN
    OPTIMIZER→EVALUATE→DEPLOY via PR). GEPA reads EXECUTION TRACES to understand WHY
    variants fail (not just that they fail) — this is "Actionable Side Information (ASI)",
    the text-optimization analogue of gradients. 4 improvement tiers in risk order:
    (1) skill files, (2) tool descriptions, (3) system prompts, (4) tool code. Phase 1
    (skills) is implemented; 2-4 are planned. 5 mandatory constraint gates: 100% test
    pass, size limits (skills ≤15KB, tools ≤500 chars, +20% max growth), caching
    compatibility, semantic preservation, human review gate. Fitness = LLM-as-judge
    (correctness + conciseness + procedure adherence) + cost/latency penalties.
    CRITICAL for EPYC: GEPA's reflective trace analysis directly upgrades PromptForge.
    Integration path: (1) Wrap EPYC prompt templates as DSPy signatures, (2) Collect
    orchestrator session trajectories in ShareGPT format, (3) Run GEPA externally with
    our benchmark suite as evaluator, (4) Gate on USACO/skill_transfer/web_research.
