  - 'Achieves 86.2±0.5% on LiveCodeBench v6 pass@1 (vs GPT-5 83.8%, Gemini 67.2%, Claude 46.5% individually); 21.9% mean relative-error reduction over 2nd-best baseline across 4 in-distribution benchmarks'
  techniques:
  - sep-CMA-ES (separable Covariance Matrix Adaptation Evolution Strategy) as gradient-free black-box optimizer for routing/role-assignment heads
  - Singular-value fine-tuning (SVD-FT) of the backbone — learn only singular-value scales, keep orthogonal matrices fixed (~9K extra params, claimed +3-4 points)
  - Penultimate-token hidden state as feature vector (vs final token, which costs >10 points on LCB)
  - Decoupled (LLM × role) action space via flat (L+3)-dim logits, softmaxed independently
  - Multi-turn role-typed delegation (Thinker analyses/plans, Worker executes, Verifier accepts/rejects) over a fixed heterogeneous agent pool
  - Verifier-acceptance-driven early termination (max K=5 turns)
  reported_results:
  - 'LiveCodeBench v6 pass@1: 86.2±0.5% (Trinity) vs 83.8% (GPT-5), 67.2% (Gemini-2.5-pro), 46.5% (Claude-4-Sonnet) — claimed coordinator-system record at submission'
  - 'Math500: 0.880, MMLU: 0.916, RLPR: 0.401 (sep-CMA-ES); REINFORCE collapses to 0.459/0.500/0.266 at comparable budget; Random Search 0.794/0.897/0.345; SFT 0.786/0.906/0.360'
  - 'Ablations: removing tri-role costs −5 to −8 points across tasks; removing Thinker alone −6.0 on Math500 / −4.57 on RLPR; SVD-FT removal −3 to −4 points; final-token instead of penultimate >−10 points on LCB'
  - 'Multi-agent baseline comparison: Trinity 0.62 LCB / 0.88 Math500 vs MasRouter 0.43/0.46, RouterDC up to 0.28 RLPR vs random 0.32; mean 21.9% relative-error reduction over 2nd-best'
  - Beats every individual pool model even when those models get 5× extended context budget or 5× self-reflection
  contradicting_evidence:
  - 'Author-acknowledged limitation (per ICLR 2026 PDF): gap between abstract reasoning and grounded execution — the coordinator can devise tool-using plans but cannot yet act on them; integration with code interpreters / APIs is future work'
  - "LiveCodeBench leaderboard (2026-04) shows single-model SOTA at 91.7% (Gemini 3 Pro Preview) — Trinity's 86.2% is competitive among coordinator systems, not the absolute SOTA across all model classes; the comparison category matters"
  - 'No public artifact (code/weights) verified at intake time — claims rest on reported numbers only'
  - 'Paper is fresh (Dec 2025 arXiv, Apr 2026 last revision); no third-party replication yet'
  cross_references:
    chapters:
