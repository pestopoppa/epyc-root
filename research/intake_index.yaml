  ingested_date: '2026-04-22'
  discovered_via: input
  expanded_from: null
  contradicting_evidence:
  - 'Tier 2b (2026-04-22): No independent replication of MindDR Bench 51.8 or the public-benchmark numbers (BrowseComp-ZH 45.7, WideSearch 46.5, xbench-DS 75.0) found — only the paper itself and derivative blog summaries. Public benchmarks are third-party so reproducible in principle, but at this date nobody outside the MindDR team has re-run them on released MindDR checkpoints.'
  - 'MindDR Bench is self-curated from Li Auto assistant logs (500 queries, 16 domains including automotive/travel/finance). Authors acknowledge automotive-industry scenario skew — "RACE score 51.8" is on their own distribution, and independent deep-research agents have not been evaluated on it. SOTA claim is intrinsically unverifiable outside the authors.'
  - 'Search-RL / Report-RL pattern is not unique — Search-R1, R1-Searcher, ReSearch predate it. Surveys (arxiv 2509.06733 RL Foundations for Deep Research, 2508.12752 Deep Research Survey) note static-corpus RAG-RL has known ceiling issues; MindDR moves to real-web search but does not publish reproduction code or hyperparameters at paper release, so the four-stage recipe is not yet verifiably replicable externally.'
  - 'Deep-RL reproducibility broadly is poor (Henderson et al. 1709.06560 "Deep RL that Matters"): intrinsic variance, stochastic environments, unreported hyperparams. Four-stage pipelines compound this — interaction effects between Search-RL and Report-RL stages are not ablated in the paper.'
  - 'GSPO vs GRPO ~15pp MoE claim is consistent with the GSPO paper (Qwen team, arxiv 2507.18071) and the Qwen3 training report — GRPO''s token-level importance ratios become unreliable on MoE due to ~10% expert-activation drift per gradient step. This specific claim has external corroboration and is NOT contradicted. However, newer alternatives (RSPO, GMPO) report matching or exceeding GSPO, suggesting the ~15pp gap may shrink as the field moves past GRPO baselines.'
  - 'Public-benchmark numbers (42-75% range across BrowseComp/WideSearch/xbench-DS) are plausible for a well-trained 30B agent and align with the broader open-source deep-research trend (Tongyi DeepResearch, DeepResearcher report similar magnitudes). No direct contradicting evidence, but also no independent confirmation specific to MindDR checkpoints.'
