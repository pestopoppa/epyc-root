    informed by ancestor lessons + diagnostic feedback, (5) ACCEPT if improved, update
    Pareto front. Three operating modes: DefaultAdapter (prompt-only), DSPy Full Program
    Adapter (evolves signatures + modules + control flow = 93% MATH), optimize_anything
    (universal: code, configs, SVGs, scheduling policies). Production stats: 50+ deployments
