    - intake-333 (IHA — related cross-head attention approach)
    handoffs:
    - multiscreen-attention-evaluation.md
  notes: >
    Related to IHA (intake-333). Alternative approach to solving head independence
    in MHA. Together with IHA and Knocking-Heads (intake-343), forms a cluster of
    2025-2026 research on cross-head communication. Relevant to our multiscreen
    attention evaluation which also explores alternative attention mechanisms.
    DEEP-DIVE 2026-04-12: Head-level Linear Composition (HLC) module applies learnable
    W_lc reweighting to K and V tensors across heads. CRITICAL finding: GroupNorm is
    ESSENTIAL — without it, cross-head mixing degenerates into standard MHA during
    training (explains why THA and DFA-without-GroupNorm showed limited gains). Unifies
    DFA and THA as special cases. KV cache compression: with h'=h/2 component heads
    reconstructed via HLC into h virtual heads = 50% KV cache reduction with only 3.59%
    drop on Olympiad math. FlashAttention compatible (HLC applied BEFORE attention).
    For EPYC: the KV cache compression insight (50% reduction via virtual heads) is
    directly useful for memory-constrained inference. ACTIONABLE: watch for MEA-
    pretrained model releases; the KV compression could apply to existing GQA models.

- id: intake-343
  arxiv_id: '2510.23052'
  url: https://arxiv.org/abs/2510.23052
  source_type: paper
  title: 'Knocking-Heads Attention'
  categories:
  - hardware_optimization
  - context_extension
  key_claims:
  - Cross-head mixing at attention logits/weights level
  - Different from IHA which mixes before attention
  techniques:
  - Knocking-Heads Attention
  - Attention weight-level head mixing
  novelty: medium
  relevance: medium
  credibility_score: 3
  verdict: worth_investigating
  discovered_via: expansion
  expanded_from: intake-333
  ingested_date: '2026-04-12'
  cross_references:
    intake:
    - intake-333 (IHA)
    - intake-342 (Explicit Multi-head Attention)
    handoffs:
    - multiscreen-attention-evaluation.md
  notes: >
    Third approach to cross-head communication. IHA mixes before attention (compatible
    with FlashAttention), Knocking-Heads mixes at logits/weights level (potentially
    incompatible with FlashAttention). This distinction matters for our inference stack
    which relies on Flash Attention for performance. Filed with the attention cluster.
    DEEP-DIVE 2026-04-12: KHA-Linear: shared transformation T^Q, T^K, T^V applied to all
    heads. At inference, CAN BE ABSORBED into projection matrices — ZERO overhead at
    runtime. KHA-MLP (better variant): sigmoid-gated MLP on values only, shared across
    heads. Diagonal initialization critical (random init causes high loss). <1% additional
    FLOPs. Results (6.1B MoE, 1B active, 1T tokens): KHA-MLP on Values with GQA gives
    -0.024 loss, +4.32 language, +3.9 code, +1.62 math. KEY FINDING: V projections
    benefit most from cross-head interaction; Q and K are optional. Training stability
    significantly improved (fewer loss spikes). For EPYC: KHA-Linear trained models
    carry better attention quality at ZERO inference cost (absorbed). Prefer KHA-trained
    models when available. The attention cluster ranking: IHA (most expressive,
    FlashAttention-compatible) > MEA (KV compression bonus) > KHA (zero inference cost).

- id: intake-344
  arxiv_id: '2508.03680'
  url: https://arxiv.org/abs/2508.03680
  source_type: paper
  title: 'Agent Lightning: Adding Reinforcement Learning to AI Agents Without Code Rewrites'
  authors:
  - Microsoft Research Asia — Shanghai
  categories:
  - agent_architecture
  - training_distillation
  - autonomous_research
  key_claims:
  - LightningRL algorithm uses hierarchical credit assignment for multi-step agent tasks
  - Credit assignment module determines per-request contribution to task outcome
  - Compatible with any single-step RL algorithm (PPO, GRPO)
  - Clean decoupling of agent logic from training logic via Lightning server/client
  techniques:
  - LightningRL hierarchical credit assignment
  - PPO and GRPO for agent steps
  - Lightning server/client architecture
  - Framework-agnostic tracing
  reported_results: []
  novelty: high
  relevance: high
  credibility_score: 4
  verdict: new_opportunity
  discovered_via: expansion
  expanded_from: intake-338
  ingested_date: '2026-04-12'
  cross_references:
    intake:
    - intake-338 (Agent Lightning repo)
    handoffs:
    - autopilot-continuous-optimization.md
    - meta-harness-optimization.md
  notes: >
    The research paper behind Agent Lightning (intake-338). The key insight is
    LightningRL's hierarchical credit assignment: after a multi-step task completes,
    a module determines how much each LLM request contributed, then assigns per-step
    rewards. This solves our autopilot's evaluation granularity problem — we currently
    evaluate at task-level (T0/T1/T2) but can't attribute success to specific
    orchestrator decisions. LightningRL + GRPO could enhance our PromptForge species.
    DEEP-DIVE 2026-04-12: arxiv:2508.03680. RLTT policy gradient distributes credit
    across ALL T_max loop iterations (vs GRPO which uses only t=T_max). MDP formulation:
    state = agent snapshot, action = full LLM output sequence, transition = (input,
    output, reward). Key innovation: trajectory decomposition into standalone transitions
    (not concatenation-with-masking) — avoids RoPE positional disruption, task-specific
    mask complexity, and excessively long sequences. Trajectory-level aggregation merges
    rollout into single masked sample → ~40% iteration time reduction. Credit assignment:
    currently UNIFORM (equal credit to all actions) — naive but works. Future: per-step
    value functions. The claude_code/ example instruments SWE-bench with LightningStore
    traces. Youtu-Agent (Tencent) validated at 128 GPUs with concurrency control and
    hierarchical timeouts. For EPYC: (1) The trajectory decomposition provides the
    theoretical framework for per-step autopilot attribution (even via prompt optimization
    instead of RL). (2) The uniform credit assignment baseline tells us our autopilot's
    task-level scoring is NOT the bottleneck — the decomposition structure matters more.

