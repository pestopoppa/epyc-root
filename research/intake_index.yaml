    EPYC serves models with varying context lengths and the benchmark provides model
    quality data across 24 models at 100K tokens. Informs routing decisions for
    long-document tasks (e.g., Gemini-2.5 class dramatically outperforms Claude/Llama
    on temporal awareness). Medium because EPYC focuses on CPU inference optimization,
    not LLM capability evaluation — but model quality data feeds routing intelligence.
  notes: >
    ICLR 2025. MIT license. 11 synthetic datasets (default, world news, sci-fi, ordered)
    at 10K/100K/1M tokens. Key insight for EPYC: chronological awareness is much harder
    than recall — even GPT-5 only reaches 0.804 vs 0.942 recall. This gap could inform
    task-specific routing: simple recall tasks can use cheaper models, but temporal
    reasoning tasks need top-tier models. The benchmark methodology (deterministic F1
    scoring, synthetic ground truth) aligns with our ch07 benchmark construction
    philosophy. Could complement existing RULER/NIAH suite for evaluating context
    extension quality (YaRN research handoff).

