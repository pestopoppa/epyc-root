  key_claims:
  - 20M steps/second RL training (up from 3-5M in v3.0)
  - Replaced PyTorch entirely with ~5000 lines of CUDA C
  - bf16 training stable only after fusing kernels (avoids repeated cast round-trips)
  - Static contiguous memory allocation enables single-kernel weight updates and gradient zeroing
  - Bitwise deterministic training via proper CUDA seeding (impossible under PyTorch)
  - LibTorch lacks torch.compile, profiler, and AMP — C++ Torch API is a dead end
  - Smaller networks become optimal only when constant overhead is reduced enough
