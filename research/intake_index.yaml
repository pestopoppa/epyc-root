  - Mor Geva
  - Roi Reichart
  - Jonathan Herzig
  categories:
  - agent_architecture
  - benchmark_methodology
  key_claims:
  - CoT reasoning expands factual recall beyond the model's direct parametric boundary
  - Two mechanisms drive this - computational buffer (extra forward passes) and factual priming (semantic associations)
  - Generative self-retrieval creates hallucination risks when intermediate facts are fabricated
  - Filtering reasoning trajectories by hallucination-free statements improves accuracy +8-12%
  - Weaker models benefit more from reasoning (Omega metric decreases with model capability)
  techniques:
  - Computational buffer effect
  - Factual priming
  - Generative self-retrieval
  - Hallucination-free trajectory filtering
  reported_results:
  - +12.2% on SimpleQA-Verified with verified-fact filtering
  - +5.1% on EntityQuestions with verified-fact filtering
  - 26.4% vs 41.4% accuracy gap between hallucinated and clean traces
