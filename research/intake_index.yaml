- id: intake-377
  url: https://github.com/huggingface/Math-Verify
  source_type: repo
  arxiv_id: null
  title: 'Math-Verify: Robust Mathematical Expression Evaluation for LLM Outputs'
  authors:
  - Hugging Face
  categories:
  - benchmark_methodology
  key_claims:
  - 'Three-step grading: answer extraction (regex priority), ANTLR4 parsing to SymPy, multi-strategy comparison'
  - 'Addresses underestimation of model performance by up to 40 points through superior parsing'
  - 'Supports LaTeX, set theory, Unicode, matrices, percentages, units, and relation evaluation'
  - 'Format-agnostic answer retrieval with best-effort extraction approach'
  techniques:
  - ANTLR4 grammar-based LaTeX to SymPy conversion
  - Multi-strategy comparison (string, symbolic, numeric precision, special cases)
  - Priority-ordered regex extraction (concrete to abstract)
  - Matrix equivalence validation and relation evaluation with flip support
  reported_results:
  - 'Highest accuracy on MATH dataset: 0.1328 vs lm-eval-harness (0.0802) and Qwen (0.1288)'
  - '1.1k GitHub stars, 53 forks, 80 commits, 10 releases (latest v0.8.0)'
  - 'Supports MATH-Hard, MATH-500, GSM8K, AMC23, AIME24 evaluation'
  references: []
  novelty: medium
  relevance: high
  credibility_score: null
  verdict: new_opportunity
  discovered_via: null
  expanded_from: null
  ingested_date: '2026-04-15'
  contradicting_evidence:
  - 'Math-Verify only checks answer correctness, not question validity — MathQ-Verify (arxiv:2505.13903) shows flawed questions cause evaluation noise'
  - 'Process Reward Models for step-level verification perform only slightly better than random guessing (multiple 2025 studies)'
  cross_references:
    chapters: []
    handoffs:
    - eval-tower-verification.md
    - mathsmith-hc-formalizer-eval.md
    - research-evaluation-index.md
    experiments: []
    intake_entries:
    - intake-376
    - intake-379
  handoffs_updated:
  - eval-tower-verification.md
  handoffs_created: []
  notes: >
    Apache-2.0 Python library for robust mathematical answer
    evaluation. Mature project (v0.8.0, 1.1k stars).

    RELEVANCE TO EPYC: HIGH — directly applicable to eval tower
    verification (eval-tower-verification.md). Current
    score_answer_deterministic() in safety_gate.py uses binary
    exact-match scoring. Math-Verify would replace this with robust
    expression comparison supporting LaTeX, symbolic equivalence,
    numeric precision, matrices, and sets.

    CRITICAL INTEGRATION CAVEATS (from deep dive):
    (1) verify() is NOT symmetric — gold must be first arg, pred
    second. Assignment simplification and equation-interval
    conversion behave differently by argument order.
    (2) NOT thread-safe — uses signal.alarm() for timeout. If
    eval_tower.py uses ThreadPoolExecutor, must either switch to
    multiprocessing, set timeout_seconds=None with external
    timeout management, or wrap in subprocess.
    (3) Open interval ambiguity: "(1,2)" converts to Tuple(1,2)
    for open intervals — could false-positive if answer is a
    coordinate pair. Monitor for this edge case.
    (4) Percentage handling is smart: "9%" == "0.09" == "9/100".
    (5) List matching uses "any match wins" — verify([a,b], [c])
    returns True if c matches either a or b.

    Integration path: pip install math-verify, replace exact-match
    in eval_tower.py _eval_question(). ANTLR4 runtime required
    (4.13.2, 4.11.0, or 4.9.3). Self-hosted, Apache-2.0.

    Accuracy impact: Math-Verify scores 0.1328 vs lm-eval-harness
    0.0802 on MATH — current exact-match likely underestimates
    model capability by ~66% on math questions. This could affect
    routing decisions.

    Deep dive: research/deep-dives/math-verify-integration-analysis.md

- id: intake-378
  url: https://arxiv.org/abs/2604.01702
  source_type: paper
  arxiv_id: '2604.01702'
  title: 'On the Role of Reasoning Patterns in the Generalization Discrepancy of Long Chain-of-Thought Supervised Fine-Tuning'
  authors:
  - Zhaoyi Li
  - Xiangyu Xi
  - Zhengyu Chen
  - Wei Wang
  - Gangwei Jiang
  - Ranran Shen
  - Linqi Song
  - Ying Wei
  - Defu Lian
  categories:
  - training_distillation
  key_claims:
  - 'Lower training loss does not guarantee better generalization — reasoning pattern structure matters more'
  - 'DeepSeek-R1 produces divergent, branch-heavy exploration patterns causing worse generalization despite lower training loss'
  - 'gpt-oss-120b exhibits convergent, deductive reasoning trajectories that transfer better'
  - 'Filtering branch-heavy trajectories improves AIME25 by 5.1%, BeyondAIME by 5.5%, average 3.6% across 5 benchmarks'
  techniques:
  - Trajectory filtering for removing frequently branching reasoning patterns
  - Convergent vs divergent reasoning pattern taxonomy
  - Token-level SFT loss analysis
  - Step-level reasoning behavior evaluation
  reported_results:
  - 'AIME25: up to 5.1% improvement from trajectory filtering'
  - 'BeyondAIME: up to 5.5% improvement'
  - 'Average across 5 benchmarks: 3.6% improvement'
  references:
  - '2604.06628'
  novelty: high
  relevance: high
  credibility_score: 3
  verdict: new_opportunity
  discovered_via: expansion
  expanded_from: intake-374
  ingested_date: '2026-04-15'
  contradicting_evidence:
  - 'No contradicting evidence found — possible confirmation bias risk. The convergent vs divergent pattern analysis is novel and not yet independently replicated.'
  cross_references:
    chapters: []
    handoffs:
    - reasoning-compression.md
    experiments: []
    intake_entries:
    - intake-374
    - intake-376
  handoffs_updated:
  - reasoning-compression.md
  handoffs_created: []
  notes: >
    Important nuance to the SFT generalization debate. While
    intake-374 argues SFT CAN generalize under the right conditions,
    this paper shows the reasoning PATTERN STRUCTURE of training
    data is a critical (previously overlooked) factor.

    RELEVANCE TO EPYC: UPGRADED to high relevance after deep dive.
    Three actionable findings:

    (1) Quantitative branching metrics (33.3% vs 22.5% Propose
    steps, 0.53 vs 0.34 Propose->Propose transition) give us
    concrete tools for evaluating reasoning trace quality at
    inference time. High branching density = model exploring
    unproductively = candidate for truncation or escalation.

    (2) Random step deletion experiment validates Tier 1 reasoning
    compression: removing 10% of DeepSeek-R1 steps causes no
    degradation (sometimes improves). Branch-heavy reasoning IS
    redundant and safe to prune.

    (3) Llama3.1-8B shows 21pp gap between R1 and gpt-oss data —
    model architecture interacts strongly with training data
    quality. Some architectures are more susceptible to learning
    surface branching patterns.

    The "dilution effect" is a key insight: DeepSeek-R1's lower SFT
    loss comes from trivial routine tokens dragging down the average,
    not from better reasoning learning. Low loss is a MISLEADING
    quality signal.

    Deep dive: research/deep-dives/sft-generalization-reasoning-patterns.md

