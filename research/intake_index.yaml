  notes: 'DFlash targets the EXACT model we''re optimizing (Qwen3.5-35B-A3B) with impressive 2.4-2.8x GPU speedups. However,
    CRITICAL BLOCKER: DFlash requires SGLang or vLLM — NO llama.cpp support, no GGUF, no CPU inference path. The block diffusion
    approach is fundamentally GPU-oriented (parallel denoising requires batched matmuls). For our CPU-bound EPYC stack, this
    is not directly adoptable. Our MTP-1 approach (78.5% acceptance, Step 7 pending) achieves comparable projected gains (1.5-1.7x)
    within llama.cpp natively. DFlash validates that Qwen3.5-35B-A3B is highly amenable to speculative decoding — the model
    architecture cooperates well with draft-verify paradigms. If we ever add GPU serving (vLLM/SGLang backend), DFlash becomes
    immediately relevant. The EAGLE-3 comparison (DFlash 2.5x faster) is notable because EAGLE-3 already failed on our GGUF
    stack (0% acceptance, intake-005). Block diffusion''s parallel drafting is orthogonal to tree verification — could theoretically
    combine with our tree speculation for dense models.'
  deep_dive: research/deep-dives/dflash-dart-diffusion-speculation.md
  deep_dive_findings:
  - Drafter IS portable to GGUF — 5-layer transformer with shared embed/LM head, 0.5B params, ~300MB Q4_K_M
  - NOT VIABLE on Qwen3.5 hybrid — same recurrent verification wall as MTP-1 Step 7 (O(N) for 75% Delta Net layers)
  - VIABLE on dense models and pure MoE — Qwen2.5-32B, Llama, Qwen3-235B where verification scales near-O(1)
  - Projected 2-4x speedup on dense/pure-MoE models vs current ~1.3x with external drafter
  - Requires new llama.cpp API for per-layer hidden state extraction (5 layer taps)
  - Block-sparse attention is the hardest component but can try causal-only fallback
  - Estimated port effort 13-20 days
