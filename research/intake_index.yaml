    - intake-135 (Cognee knowledge engine)
    - intake-141 (Contextual Memory Virtualisation)
    - intake-265 (Omni-SimpleMem)
    - intake-267 (ByteRover)
    - intake-326 (MemPalace)
    handoffs:
    - context-folding-progressive.md
    - hermes-agent-index.md
    - tool-output-compression.md
  notes: >
    Excellent design-space taxonomy. The nine-axis framework (write triggers, storage backend,
    retrieval mode, curation, forgetting, timing) maps directly to our context-folding design
    decisions. Our approach: derived storage (session_compaction), hook-driven retrieval (worker
    index injection), harness curation (session_compaction trigger at 60%), append-only forgetting
    (context is lost when compacted). The essay highlights our key weakness: derivation drift
    from repeated summarization. Our L1-L4 compression ladder (Phase 2b) attempts to address this
    with tiered compression levels. The raw vs derived tradeoff is exactly the tension in
    Phase 2c (ByteRover enhancement) — adding hash-based dedup to preserve some raw segments.
    Actionable insight: implement provenance tracking so we can trace derived summaries back
    to their source turns and detect drift.
    DEEP-DIVE 2026-04-12: Author confirmed as Chrys Bader (Twitter/X @chrysb), CTO/co-founder
    of Dot (personal AI companion app). The nine-axis framework applied to our stack:
    (1) Write triggers: we use heuristic (60% context fill), essay suggests LLM-as-curator
    is terrible at predicting what matters later — validates our threshold-based approach.
    (2) Storage: we use derived (session summaries), MemPalace uses raw verbatim (96.6%
    recall), Mem0 uses derived ($249/mo, ~85%). Our derivation drift risk is real.
    (3) Retrieval: we use hook-driven (worker index injection at session start). Essay warns
    hook-driven is expensive and "makes the model perform memory rather than truly have it."
    (4) Curation: harness-based (deterministic session_compaction trigger). Essay confirms
    this is cheapest but sloppiest. (5) Forgetting: append-only (context lost when compacted).
    Essay warns contradictions accumulate — we should implement supersession. (6) Timing:
    synchronous (compaction runs in-conversation). Essay recommends async background for
    expensive derivations — our worker_fast summarizer already does this. Key gap analysis:
    our weakest axis is FORGETTING (append-only, no provenance, no contradiction detection).
    MemPalace has temporal KG with validity windows (closer to ideal). Actionable: (1) Add
    validity timestamps to session compaction segments. (2) Implement supersession detection
    (when new info contradicts old compacted info). (3) Consider hybrid raw+derived approach
    for Phase 2c: keep raw segments for recent turns, derive only older ones.

