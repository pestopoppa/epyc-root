  - '10.7x KV memory reduction matching Full Attention accuracy (40.8%)'
  - '1,405 tok/s vs 223 tok/s on MATH500 (68.4% vs 69.6% accuracy)'
  - 'Outperforms SnapKV and R-KV baselines at 2048 token KV budget'
  novelty: high
