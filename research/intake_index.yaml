    works because draft and target share the MoE backbone. This does NOT transfer to
    our hybrid (Mamba2+attention) models.
    - MLA: Similar to DeepSeek-V3.2's approach. Our models don't use MLA.
    - Baseten production insight: DSA has short-sequence bypass (skip indexer if seq < k).
