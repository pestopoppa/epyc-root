    trial a CEM sampler: sample K configs from N(mu, sigma), score via eval
    tower, refit to elite set. Requires scalarizing the 4D objectives
    (hypervolume contribution is the natural choice). Worth prototyping if
    NSGA-II stagnation becomes a bottleneck (hv_slope < 0.001 already
    triggers exploration boost — CEM could be the boost mechanism).
