    Challenges prevailing wisdom about SFT vs RL for reasoning
    generalization. Strongest finding: generalization is conditional,
    not absent. Repeated exposure > coverage is a practical training
    recipe. Safety degradation finding is concerning for production.

    RELEVANCE TO EPYC: We don't train models, but this paper
    informs our understanding of why different models generalize
    differently — relevant for model selection and routing decisions.
    The CoT quality findings reinforce our reasoning-compression
    handoff's emphasis on verified, high-quality reasoning traces.
    The safety degradation finding is a red flag for any future
    fine-tuning work (Doc-to-LoRA, etc). Code repo:
    github.com/Nebularaid2000/rethink_sft_generalization

