- id: intake-176
  arxiv_id: '2504.20595'
  url: https://arxiv.org/abs/2504.20595
  source_type: paper
  title: 'ReasonIR: Training Retrievers for Reasoning Tasks'
  authors: []
  categories:
  - retrieval_augmented_decoding
  - benchmark_methodology
  key_claims:
  - First retriever specifically trained for general reasoning tasks
  - Synthetic data generation pipeline creates challenging reasoning queries with hard negatives
  - ReasonIR-8B achieves 29.9 NDCG@10 (without reranker) and 36.9 (with reranker) on BRIGHT
  - Existing retrieval training datasets focus on short factual queries — reasoning tasks need different data
  - Mixture of synthetic + public data training strategy
  techniques:
  - Synthetic reasoning query generation
  - Hard negative mining for reasoning tasks
  - BRIGHT benchmark evaluation
  reported_results:
  - '29.9 NDCG@10 on BRIGHT (no reranker)'
  - '36.9 NDCG@10 on BRIGHT (with reranker)'
  - 'State-of-the-art on reasoning-intensive retrieval at time of publication'
  novelty: medium
  relevance: medium
  verdict: worth_investigating
  discovered_via: expansion
  expanded_from: intake-174
  ingested_date: '2026-03-20'
  cross_references:
    intake:
    - intake-174
    handoffs:
    - routing-intelligence.md
  notes: >
    Deep dive analysis (2026-03-20): The most transferable finding is the hard-negative generation
    methodology, not the retriever model itself. ReasonIR generates "plausibly related but ultimately
    unhelpful" documents as negatives — this maps directly to a routing failure mode where semantically
    similar tasks (e.g., "implement quicksort" vs "explain quicksort complexity") get identical routing
    despite needing different handling (REPL vs direct). Our extract_training_data.py generates training
    pairs from Q-values but has no hard-negative generation. Adding contrastive negatives — same-domain
    tasks that succeeded with DIFFERENT roles — could sharpen the routing classifier MLP's decision boundary.

    The +22.6% GPQA and +6.4% MMLU RAG improvements suggest that when ReasonIR is used as a RAG retriever
    (not routing), it materially improves downstream answer quality on reasoning tasks. Relevant if we
    expand web_research with better source retrieval. Dataset (100K triplets) publicly available on HF.
    Note: DIVER (arXiv:2508.07995) subsequently achieved 45.8 NDCG@10 on BRIGHT, surpassing ReasonIR.

