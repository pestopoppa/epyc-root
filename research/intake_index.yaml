  contradicting_evidence:
  - '2026-04-22 Tier 2b sweep: AIME25 is 30 questions — +6pp = 2 questions flipped. Community evaluation protocol (artificialanalysis.ai, vals.ai, DeepScaleR, DeepConf) requires 8-seed averaged pass@1 with CIs; STOP reports single-seed point estimate. +6pp plausibly inside 95% CI of baseline. Sources: intuitionlabs.ai/articles/aime-2025-ai-benchmark-explained; github.com/agentica-project/deepscaler/issues/3.'
  - '2026-04-22 Prior art weakens mechanism novelty: prompt-tuning / prefix-tuning with frozen-backbone probe classifiers is well-established (arxiv 2601.13288 token-layer selective probes, arxiv 2512.16650 prefix probing, IBM prompt-tuning docs). A single learnable prefix token + linear scoring head on a frozen LLM is standard prompt-tuning machinery. Novelty survives at the application/taxonomy level, not the mechanism level.'
  - '2026-04-22 Training-free competitors unreferenced: DeepConf (sliding-window group confidence), Stop-When-Enough (arxiv 2510.10103), REFRAIN (SW-UCB bandit), Confidence-Dynamics early stopping (arxiv 2604.04930), SlimSC semantic-similarity, Latent Informativeness Signals CoT pruning. If any matches STOP at >=1.5pp or >=25% token savings, STOP''s training cost is not justified.'
  - '2026-04-22 Medusa analogy is loose — Medusa (arxiv 2401.10774) adds decoding heads for token-level speculative acceptance, not branch-selection; different mechanism. But "frozen-backbone + learnable head" training pattern has a 2+ year Medusa-1 track record. Open question: does value-discrimination transfer as cleanly as next-token prediction did?'
  - '2026-04-22 "Identifies unproductive branches from initial errors" unfalsified — paper lacks ablation isolating (a) legitimate error detection vs (b) rejection of non-canonical-but-correct traces vs (c) length proxy (short = doomed is a known short-m@k confound). Without a length-only baseline ablation, the learned signal may be largely re-implementing short-m@k.'
