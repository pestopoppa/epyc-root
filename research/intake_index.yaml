  cross_references:
    intake:
    - intake-167
    - intake-168
    handoffs:
    - ssm-hybrid-acceleration.md
  notes: 'Pure C/Objective-C + Metal inference engine. Key innovation is SSD expert streaming: inactive MoE experts are stored
    on disk and loaded on demand via parallel pread() with F_NOCACHE (Direct I/O), overlapping I/O with GPU computation. 2-bit
    expert quantization uses grouped affine quantization (group_size=64, RMSE 0.0017-0.0023 vs full precision, no perplexity
    data reported). Reduces the 397B model to fit in 48GB SSD streaming budget. For EPYC: our 397B at Q4_K_XL (~205GB)
    fits in server RAM so SSD streaming isn''t immediately needed, but the 2-bit quant concept could reduce memory footprint
    to ~100GB, freeing RAM for multi-model orchestration. Metal kernels are Apple-specific and not transferable. The I/O overlap
    pattern (deferred GPU compute while loading next expert) is architecturally interesting for any offloading scenario.
    Transferable insight: removing app-level weight caching for OS page cache gave 38% speedup — surfaced multi-model page cache
    contention opportunity for our ~650GB mmap serving stack (see multi-model-page-cache.md handoff). No pure-attention MoE in our
    production stack, so SpecMoEOff-style speculation+offloading is inapplicable. Inspired by Apple''s LLM in a Flash
    (arxiv:2312.11514).'
  arxiv_id: null
