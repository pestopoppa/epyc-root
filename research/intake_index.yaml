    (MoE self-draft 0.50-0.72x). No pure-attention MoE models in stack — SpecMoEOff is a dead end for current models. Would
    only become relevant if non-hybrid MoE models are added to production. The CPU chunked attention kernel is interesting
    for our CPU-first inference stack. Published August 2025.'
