  - 'Arena-agent collusion risk: ETD discovery agent and training agent both use Qwen3 family. TRACE benchmark-contamination analysis (arxiv:2601.20103) notes circular labeling when generator and evaluator share backbone yields "optimistically biased" scores — matches the failure mode in deep-dive §10.3.'
