    LOCAL DEPLOYMENT: unsloth/GLM-5-GGUF (32.6K downloads/month, MIT license).
    KTransformers CPU/GPU hybrid exists but NO benchmarks published. Single-GPU +
    300GB RAM setup per KTransformers docs. 2-bit quantized ~241-281GB.

