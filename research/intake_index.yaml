- id: intake-236
  arxiv_id: null
  url: https://huggingface.co/0xSero/Qwen-3.5-28B-A3B-REAP
  source_type: repo
  title: '0xSero/Qwen-3.5-28B-A3B-REAP — REAP 20% on Hybrid Qwen3.5'
  authors:
  - 0xSero
  categories:
  - moe_optimization
  - inference_serving
  key_claims:
  - REAP 20% expert pruning applied to Qwen3.5-35B-A3B (HYBRID Delta Net model — contradicts our assumption that REAP is pure-MoE only)
  - 256 → 205 experts, ~29B params, 71GB → 53GB bf16 (25% memory reduction)
  - 'HumanEval: 76.2% → 73.2% (-3pp), MMLU: 84.3% → 80.9% (-3.5pp)'
  - 'Perplexity 6.83 → 9.51 (+39%) — MUCH worse than pure MoE REAP quality retention'
  - 'vLLM throughput essentially flat (1.02x batch=1, 0.95-0.97x batch>1) — routing overhead dominates'
  - Calibration on mixed code/math/science dataset (1000 samples, 4 sources)
  techniques:
  - REAP expert pruning on hybrid Delta Net + MoE model
  - Router weight renormalization post-pruning
  reported_results:
  - 'HumanEval pass@1: 73.2% (from 76.2%, -3.0pp)'
  - 'HumanEval+ pass@1: 70.1% (from 72.0%, -1.9pp)'
  - 'MMLU: 80.89% (from 84.34%, -3.45pp)'
  - 'MMLU Humanities: 76.35% (from 82.40%, -6.05pp — worst subscore)'
  - 'WikiText-2 PPL: 9.51 (from 6.83, +39%)'
  - 'vLLM 4xRTX3090 batch=1: 12.5 tok/s (from 12.3, +1.6%)'
  - 'Memory: 53GB bf16 (from 71GB, -25%)'
  novelty: medium
  relevance: high
  verdict: worth_investigating
  discovered_via: input
  ingested_date: '2026-03-28'
  cross_references:
    intake:
    - intake-181
    - intake-183
    - intake-184
    handoffs:
    - reap-moe-expert-pruning.md
  handoffs_updated:
  - reap-moe-expert-pruning.md
  notes: >
    KEY FINDING: REAP CAN be applied to hybrid Qwen3.5-35B-A3B despite our handoff
    stating "NOT supported by REAP repo — only pure MoE layers." 0xSero likely pruned
    only the MoE layers while leaving Delta Net recurrent layers untouched. However,
    quality degradation is notably worse than pure MoE REAP: PPL +39% vs near-lossless
    at 20-25% on pure MoE (Qwen3). This suggests hybrid models are less tolerant of
    expert pruning — the remaining experts must compensate for fixed recurrent layer
    capacity. The vLLM throughput being flat confirms our finding that routing overhead
    dominates at small batch sizes. For our llama.cpp/CPU stack, the GGUF would be
    smaller but speculation behavior on hybrid REAP is unknown. Phase 3 of our handoff
    should consider testing this if we ever want REAP on the hybrid frontdoor.

