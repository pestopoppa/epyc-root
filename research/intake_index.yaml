  - 'ETH Zurich (2602.11988): LLM-generated agentfiles hurt performance by 20%+; human-written ones help ~4%'
  - Agents spend 14-22% more tokens processing context instructions without improving resolution rates
  - Chroma context rot shows performance degradation at longer contexts, steeper with low semantic similarity
