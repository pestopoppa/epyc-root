    DEEP-DIVE 2026-04-07: UPGRADED relevance low → medium, verdict not_applicable → worth_investigating.
    PufferLib itself is overkill for our routing problem (its value is 20M env steps/s, but
    our routing env is trivially fast to simulate). However, the deep-dive uncovered a
    concrete integration path: train a TINY MLP routing policy (~5-10k params, 2x64 hidden)
    via standard PPO on offline data from seeding diagnostics + MemRL episodes. This replaces
    heuristic routing rules while consuming the same classifier features. Inference: sub-microsecond.
    Deploy by exporting weights as a C header and linking into orchestrator — 50 lines of C.
    KEY ADJACENT FINDING: BaRP (arXiv:2510.07429) is the closest existing approach — lightweight
    policy network trained with bandit feedback, preference-conditioned, 16.8% better than
    GraphRouter at 50% less cost. Also: PROTEUS (2604.00136) uses Lagrangian RL with cost
    constraints, LLM Bandit (2502.02743) transfers across unseen models. These are more
    directly applicable than xRouter's 7B-router approach. PufferLib's insight that "less
    optimized code biases toward larger networks" supports training tiny routers over 7B ones.
    ACTION: (1) Add BaRP, PROTEUS, LLM Bandit to intake queue for cross-reference.
    (2) Evaluate feasibility of offline RL routing policy trained on Package A seeding data.
    (3) The PufferLib MinGRU architecture is unnecessary — routing decisions are stateless.

- id: intake-276
  arxiv_id: '2604.00025'
  url: https://arxiv.org/abs/2604.00025
  source_type: paper
  title: 'Brevity Constraints Reverse Performance Hierarchies in Language Models'
  authors:
  - MD Azizul Hakim
  categories:
  - training_distillation
  - benchmark_methodology
  key_claims:
  - On 7.7% of benchmark problems, larger models underperform smaller ones by 28.4pp
  - Mechanism is scale-dependent verbosity causing errors through overelaboration
  - Brevity constraints improve large model accuracy by 26pp
  - Performance gaps reduced by up to two-thirds with brevity constraints
  - Large models produce 59% more tokens than small models (202 vs 127) with fewer explicit reasoning steps (9.1 vs 10.5)
  techniques:
  - Brevity-constrained prompting
  - Scale-dependent verbosity analysis
  - Performance hierarchy reversal via output length control
  reported_results:
  - 31 models evaluated (0.5B-405B) across 1,485 problems, 5 datasets
  - 26pp accuracy improvement from brevity constraints on large models
  - 7.7-15.9pp advantages for large over small after constraints (reversed from original)
  - Token reduction 60.4% (brief) to 71.1% (direct format)
  - Math and science benchmarks most affected
  references: []
  novelty: medium
  relevance: high
  discovered_via: input
  verdict: already_integrated
  ingested_date: '2026-04-07'
  cross_references:
    handoffs:
    - reasoning-compression.md
  notes: >
    Strong empirical validation of what EPYC already implements. Our reasoning-compression
    handoff independently discovered the same principle via OPSDC (intake-110): verbosity
    harms quality, conciseness improves it. Action 1 (conciseness prompting) deployed to
    worker_general, worker_math, coder_primary on 2026-03-14. Action 3 (difficulty-adaptive
    routing via output length ratio) also deployed. This paper provides broader empirical
    backing (31 models, 5 datasets) for our approach. Key delta: their 7.7% "inverse scaling"
    finding quantifies the problem size. Our OPSDC-based approach goes further with
    self-distillation training (Tier 3).
    DEEP-DIVE 2026-04-07: UPGRADED verdict already_integrated → worth_investigating.
    Several novel findings NOT yet in EPYC:
    (1) Our "be concise" prompts are the WEAKEST form of brevity constraint tested. Every
    adjacent paper (TALE arXiv:2412.18547, CCoT arXiv:2407.19825) finds explicit numeric
    word limits outperform stylistic instructions. Math sweet spot: 30-60 words. Template:
    "Provide a BRIEF solution in under 50 words. Show only essential calculation steps."
    MC template: "Answer with just the letter and ONE sentence explanation."
    (2) TALE dynamic budget: "Let's think step by step and use less than {beta} tokens"
    improves GSM8K by +3.1pp while cutting 76% of tokens. Could replace regex difficulty signal.
    (3) Inverse scaling is domain-specific: BoolQ 11.3%, CommonsenseQA 9.7%, ARC 9.3%,
    GSM8K 4.3%, MMLU-STEM 3.9%. Comprehension tasks most affected, not math.
    (4) Model-tier differentiation needed: large models (>=70B) get 60% token reduction from
    brevity, small models barely affected. worker_math (30B-A3B) needs lighter prompts than
    architect tier (32B/72B).
    (5) ACL 2025 verbosity compensation paper: verbosity signals uncertainty. Long response
    after conciseness prompt = uncertain = escalate. Extends our ratio-based difficulty signal.
    (6) Deep-thinking tokens (arXiv:2602.13517): raw length negatively correlates with accuracy
    (r=-0.544). Our 1.5x reasoning alarm threshold may be too conservative.
    (7) OckBench (2511.05722): smaller models may be MORE expensive per correct answer due to
    overthinking — challenges "small = cheap" assumption. Measure per-token intelligence.
    ACTIONS: (A) Replace "be concise" with explicit word limits in worker prompts (50w math,
    "letter + 1 sentence" MC, 10w yes/no). (B) Add TALE, CCoT, verbosity compensation,
    deep-thinking tokens, OckBench to intake queue. (C) Differentiate conciseness by model tier.
    (D) Add OAA metric to eval framework. (E) Measure per-token intelligence across tiers.

