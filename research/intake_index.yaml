    RELEVANCE TO EPYC: The predict-then-optimize vs decision-aware
    learning distinction maps directly to our routing problem. Current
    Q-scorer uses predict-then-optimize (predict quality scores, then
    select model). Decision-aware learning (minimize decision regret,
    not prediction error) could improve routing — aligning with xRouter
    approach in Chapter 08. PredOpt's expandable architecture (train on
    small, apply to large) could inform scaling routing across model counts.

