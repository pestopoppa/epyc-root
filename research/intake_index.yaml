    - tool-output-compression.md
  handoffs_updated:
  - context-folding-progressive.md
  handoffs_created:
  - tool-output-compression.md
  notes: >
    Practical tool operating at a different layer than our context management
    work. While context-folding compresses conversation history, RTK compresses
    tool outputs before they enter the context. These are complementary: RTK
    reduces input tokens, context-folding manages accumulation. For our autopilot
    infrastructure (Claude API calls), RTK could reduce per-session token costs
    by 60-80%. For local llama.cpp sessions with constrained context windows,
    the upstream compression would reduce compaction frequency. 17.3k GitHub
    stars indicates strong adoption. Integration path: Claude Code PreToolUse
    hook — straightforward to deploy.

