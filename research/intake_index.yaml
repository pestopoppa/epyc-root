  relevance_justification: 'Two integration paths elevate relevance to medium: (1) Tier 3 training — reasoning-compression references GRPO-based training (OPSDC, RLSD, FoldGRPO). TPO is a direct GRPO replacement, especially strong on sparse binary rewards (reasoning verification). (2) Autopilot NumericSwarm — TPOs core mechanism (q_i proportional to p_old * exp(score), fit via cross-entropy) is the Cross-Entropy Method (CEM). The autopilot numeric_swarm.py uses NSGA-II/Optuna over 5 parameter surfaces (23 params total) with 4D Pareto scoring. A CEM-style sampler could replace or augment NSGA-II for the numeric surface. Full control surface (66+ dims with flags) is infeasible — heterogeneous action space (numeric + text mutations + binary flags) and expensive eval tower (30s-30min per trial) make K-rollout groups prohibitive. The 23-param numeric surface is tractable. The papers bandit experiments (single-context K=100, multi-context N=100 K=10) are the closest structural analog to the autopilot trial loop.'
