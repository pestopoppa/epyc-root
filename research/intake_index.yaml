- id: intake-326
  arxiv_id: null
  url: https://github.com/MemPalace/mempalace
  source_type: repo
  title: 'MemPalace: Local AI Memory System with 96.6% LongMemEval Recall'
  categories:
  - memory_augmented
  - knowledge_management
  key_claims:
  - '96.6% LongMemEval R@5 — highest published result for zero-cost, offline memory'
  - 'Palace architecture: wings (projects/people) → rooms (topics) → drawers (raw verbatim content)'
  - '19 MCP tools — integrates with Claude, ChatGPT, Gemini, and local models'
  - 'Temporal knowledge graph tracking entity relationships and validity windows in SQLite'
  - 'AAAK compression dialect — lossy abbreviation readable by any LLM without decoders'
  techniques:
  - Palace hierarchical memory architecture (wings/rooms/drawers)
  - Semantic search via ChromaDB on raw unsummarized text
  - Metadata filtering by wing/room (34% retrieval improvement over flat search)
  - 'Four-layer memory stack: identity (L0), critical facts (L1), room recall (L2), deep search (L3)'
  - Temporal knowledge graph in SQLite
  - AAAK compression dialect
  reported_results:
  - '96.6% R@5 on LongMemEval'
  - '34% retrieval improvement from hierarchical filtering vs flat search'
  novelty: high
  relevance: high
  credibility_score: 3
  verdict: new_opportunity
  discovered_via: input
  ingested_date: '2026-04-12'
  contradicting_evidence:
  - 'LongMemEval is retrieval-focused — does not test derivation quality or long-term coherence'
  - '96.6% recall on raw text may not hold when memory grows beyond benchmark scale'
  cross_references:
    intake:
    - intake-135 (Cognee knowledge engine)
    - intake-267 (ByteRover hierarchical context)
    - intake-316 (LTM Unsolved essay — MemPalace partially addresses the design space)
    handoffs:
    - context-folding-progressive.md
    - hermes-agent-index.md
    - tool-output-compression.md
  notes: >
    Strong memory system with published benchmark results. Key architectural insight: they
    search RAW unsummarized text (avoiding derivation drift from intake-316) but organize it
    hierarchically (avoiding the flat-search problem). This is a middle ground between raw
    and derived that our context-folding should consider. The four-layer stack (L0 identity
    → L3 deep search) parallels our L1-L4 compression ladder. The AAAK compression dialect
    is novel — lossy abbreviation that any LLM can read without special decoders. The 19
    MCP tools make it plug-and-play with Claude Code. MIT license. Worth deep-diving for
    context-folding Phase 2c integration ideas.
    DEEP-DIVE 2026-04-12: CRITICAL finding — GitHub issue #214 flags "benchmarks do not exercise
    MemPalace — headline 96.6% is a ChromaDB score." The palace architecture (wings/rooms/drawers)
    is NOT tested by LongMemEval. The 96.6% is ChromaDB vector search on raw text with metadata
    filtering, not the palace hierarchy. The +34% retrieval boost from wing/room filtering is
    their own internal measurement, not LongMemEval-validated. AAAK compression details: regex-based
    entity abbreviation system (not reversible compression). AAAK overhead costs MORE than it saves
    on short conversations — only amortizes at scale (hundreds of repeated entity mentions). 84.2%
    AAAK vs 96.6% raw = 12.4pp regression, but 84.2% still beats Mem0 (~85%) and Zep (~82%) at
    zero cost. Architecture: L0 (identity, ~170 tokens always injected) → L1 (critical facts from
    temporal KG) → L2 (room-filtered ChromaDB search) → L3 (full deep search). Temporal KG uses
    SQLite with validity windows per entity-relationship triple. 19 MCP tools enable direct Claude
    Code integration. DOWNGRADE novelty: the 96.6% headline is misleading — it's standard ChromaDB
    performance, not a palace architecture breakthrough. However, the hierarchical metadata filtering
    (wings/rooms) IS genuinely useful for our context-folding — adding topic-based filtering to our
    session compaction index could improve retrieval precision. The L0-L3 stack design is the real
    contribution. Actionable: (1) Evaluate adding wing/room-style metadata tags to our session
    compaction worker_explore index. (2) The temporal KG (entity + validity window) pattern could
    inform our user modeling (hermes B1). (3) Test raw-storage approach for session segments
    (keep some verbatim segments alongside compressed summaries) in Phase 2c.
  handoffs_updated: []

