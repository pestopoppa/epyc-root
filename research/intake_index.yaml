  - 'Parameter-reduction is not equivalent to DRAM-bandwidth reduction on CPU. Per feedback_cpu_decode_bw_bound (CPU decode is BW-bound on EPYC 9655) and project_cpu1_software_levers_exhausted, our bottleneck is unique-weight DRAM traffic per token. A looped middle block reuses the SAME weights across iterations: traffic per forward pass = unique-weight bytes × loop_count IF weights do not stay L3-resident. For our 30B-A3B Q4 (~14 GB active) or 27B Q4 (~14.9 GB active), looped weights cannot fit in L3 (256 MB) — so parameter reduction at fixed effective depth offers no per-token DRAM-traffic win on Zen5. Looping helps memory FOOTPRINT (model size on disk / RAM) but not BW-bound decode throughput at our model scale.'
