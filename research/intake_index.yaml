- id: intake-441
  url: https://arxiv.org/abs/2604.16027
  arxiv_id: '2604.16027'
  source_type: paper
  title: Where does output diversity collapse in post-training?
  authors:
  - Constantinos Karouzos
  - Xingwei Tan
  - Nikolaos Aletras
  categories:
  - training_distillation
  - context_management
  - autonomous_research
  key_claims:
  - 'Post-trained LMs generate significantly less varied outputs than base models'
  - 'Diversity collapse location correlates with training data composition rather than post-training method'
  - 'CoT suppression preserves answer-level diversity in Think models — collapse is in weights, not format'
  - 'Diversity loss decomposes into quality-control and genuine narrowing'
  - 'Inference-time interventions cannot recover training-time diversity loss'
  techniques:
  - Analysis across OLMo 3 lineages (Think, Instruct, RL-Zero)
  - 15-task diversity evaluation (entropy, diversity-2, type-token ratio, self-BLEU)
  - Decomposition into quality-control + residual
  reported_results:
  - 'Think lineage loses most semantic diversity at SFT stage'
  - 'DPO effects larger in Instruct than Think'
  - 'Think models retain more correct-answer diversity despite aggregate collapse'
  - 'Patterns task-dependent and correlate with training data composition'
  referenced_arxiv_ids: []
  novelty: high
  relevance: high
  credibility_score: 5
  verdict: worth_investigating
  ingested_date: '2026-04-22'
  discovered_via: input
  expanded_from: null
  contradicting_evidence:
  - 'Verbalized Sampling (arXiv 2510.01171, Zhang et al., 2025) — training-free prompting strategy that mitigates mode collapse at INFERENCE time; recovers ~66.8% of base-model diversity and delivers 1.6-2.1x boost in creative writing. Directly contradicts load-bearing claim #5 (inference-time interventions cannot recover training-time diversity loss). Root cause framed as typicality bias in preference data, not weight-level collapse — prompting for a distribution of responses unlocks latent diversity aligned models still retain.'
  - 'Self-BLEU metric criticism (Alihosseini et al., ACL W19-2311, 2019) — Self-BLEU ignores quality and fails to match divergence-based diversity metrics; real text samples can be outperformed by manually-constructed models on both BLEU and Self-BLEU. Threatens validity of the paper''s self-BLEU axis.'
  - 'Form-based diversity metric weakness (arXiv 2506.00514, 2025) — distinct-N and self-BLEU are surface-level; form-based metrics have high distributional overlap and cannot distinguish semantic diversity. Embedding / Chamfer metrics separate diverse from non-diverse sets better than self-BLEU-3. Supports EV-8 gaming risk: a mutation injecting random lexical filler could pass distinct-2 without semantic-diversity gain.'
  - 'OLMo 3 family specificity — paper is entirely on OLMo 3 7B dense; no cross-family replication on Qwen3/Llama-3/Mistral, and no MoE coverage (our production stack includes Qwen3-30B-A3B + GLM-4.5 MoE). Generalization to our actual models is untested in the literature.'
  - 'Temperature / top-p sampling practitioner literature (2026) — T=0.8-1.2 with top-p=0.8-0.95 is widely reported to restore useful diversity on aligned models. Weaker (non-peer-reviewed) counter-signal, but suggests the paper''s "temperature bumps plateau well short of base" claim is contested in applied deployments.'
  cross_references:
    chapters: []
    handoffs:
    - autopilot-continuous-optimization.md
    - reasoning-compression.md
    - eval-tower-verification.md
    experiments: []
    intake_entries: []
  handoffs_updated:
  - autopilot-continuous-optimization.md
