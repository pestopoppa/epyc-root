    DEEP-DIVE 2026-04-12: Training-Agent Disaggregation architecture: (1) Agent Runner
    (CPUs) manages tasks + collects data, (2) Algorithm Component (GPUs) hosts LLMs +
    runs RL, (3) LightningStore (OTLP spans) provides async communication. Instrumentation
    via agl.emit_xxx() helpers captures prompts, outputs, tool calls, rewards. Key examples
    in repo: calc_x/ (VERL+AutoGen), chartqa/ (LangGraph+vision), claude_code/ (SWE-bench
