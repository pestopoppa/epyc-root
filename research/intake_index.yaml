  - cudagraphs for inference + training + model update
  - bf16 with fp32 master weights, fused activations in fp32
  - Static memory allocator (shape+ptr registration, single contiguous alloc)
  - Parallel rollouts on separate CUDA streams
  - Native C environment threading with OMP
  - Buffered async environment vectorization (replaced round-robin)
  - Pinned memory for CPU→GPU observation transfer
  - Multi-GPU via 5 lines of NCCL (replaced DDP)
  reported_results:
  - 20M steps/s (Breakout, wallclock-optimal hyperparams)
  - 4x improvement over PufferLib 3.0 (3-5M steps/s)
  - Could hit 30-40M with inflated batch sizes (not representative)
  - Published at Reinforcement Learning Conference 2025 (v2.0 paper)
  references:
