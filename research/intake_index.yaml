  notes: >
    DEEP-DIVE 2026-04-14: SearXNG is a direct replacement for the brittle DDG
    HTML scraping + Brave fallback in search.py (lines 31-142). Current pipeline:
    curl fetches DDG/Brave HTML → regex parses result__a/snippet classes → 2s
    hardcoded rate limit → fragile against layout changes and bot detection.
    SearXNG replacement: GET /search?q=...&format=json returns structured JSON
    with url, title, content (snippet), engine, engines[] (multi-engine provenance),
    positions[], score. Result merging is built-in — when multiple engines return
    the same URL, they're merged with boosted score. This is richer than what
    _search_duckduckgo() provides.

    DEPLOYMENT: Docker ~183MB image + optional Valkey sidecar. Fits the existing
    orchestrator_stack.py Docker management pattern (DOCKER_SERVICES list, ports
    8088/8089 for NextPLAID). SearXNG would take a new port (e.g., 8090). Config
    via mounted settings.yml with use_default_settings: true, search.formats: [html, json],
    server.limiter: false (CRITICAL — limiter API_MAX=4/hr blocks programmatic use).

    CRITICAL CAVEATS: (1) Google blocks SearXNG via TLS fingerprinting — expect
    Google engine to be unreliable. Mitigation: rely on DDG/Brave/Wikipedia/Qwant
    as primary engines. (2) Limiter MUST be disabled for backend use — API_MAX=4/hr
    is a hard blocker, plus bot detection blocks python-requests user-agent.
    (3) JSON format must be explicitly enabled in settings.yml. (4) No max_results
    API parameter — fixed ~20 per page, client-side truncation needed.

    PIPELINE COMPOSITION: SearXNG → ColBERT reranker (S5) is a natural fit.
    SearXNG returns top-N snippets with scores via JSON, ColBERT reranks by
    MaxSim on snippet text, top-3 get fetched and synthesized. The engines[]
    and score fields provide additional signal for ranking confidence. The existing
    _dedup_pages() in research.py handles paragraph-level dedup post-fetch;
    SearXNG handles URL-level dedup pre-fetch.

    COMPARISON TO CURRENT APPROACH: Current _search_duckduckgo() is 112 lines
    of fragile HTML parsing with 2 engine-specific regex parsers (DDG, Brave).
    SearXNG replacement would be ~15 lines: requests.get() + json parsing. The
    web_search() function signature (query, max_results, domain_filter) maps
    directly to SearXNG's API params (q, engines, categories). Domain filter
    maps to q parameter with site: prefix (already done in current code).

    LICENSE: AGPL-3.0 — no issue for self-hosted internal tool use (no distribution).
    Python 80.5%, 9340+ commits, very actively maintained (latest docs: 2026.4.13).

