- id: intake-235
  source_type: field_report
  title: 'Small Model Deployment Learnings: Qwen3.5-4B, Outlines, LoRA, RL Thresholds'
  reported_by: colleague
  categories:
  - small_model_deployment
  - constrained_decoding
  - finetuning
  - rl_training
  key_claims:
  - Qwen3.5-4B is very fast and multimodal, needs ~1-2K tokens context for good performance
  - Outlines (dottxt) hijacks logit processing pipeline to guarantee structured outputs
  - Outlines supports JSON schemas, Pydantic BaseModel, context-free grammar templates
  - Enums, hierarchical enums, complex nested schemas all possible with Outlines
  - Small models are immensely LoRA-finetunable; 0.8B recommended for local training
  - RL finetuning threshold: if baseline reward < 20%, skip RL and do SFT with synthetic data first
  - GEPA can quickly optimize prompts given an eval dataset
  techniques:
  - Outlines constrained decoding (logit-level guidance)
  - LoRA fine-tuning for small models
  - SFT with synthetic data as RL prerequisite
  - GEPA prompt optimization
  reported_results:
  - 'Qwen3.5-4B practical for solo SaaS automation tasks'
  - 'RL reward baseline threshold: 20% minimum before attempting RL'
  - '0.8B models finetunable locally with LoRA'
  novelty: medium
  relevance: medium
  verdict: worth_investigating
  discovered_via: field_report
  ingested_date: '2026-03-28'
  cross_references:
    handoffs:
    - routing-intelligence.md
    - autopilot-continuous-optimization.md
    - 08-doc-to-lora-prototype.md
    intake:
    - intake-103
  notes: >
    The 20% RL reward threshold is a useful practical heuristic — if the model
    can't get 20% baseline reward, the reward signal is too sparse for RL to
    learn from. SFT with synthetic data fills the gap. The Outlines integration
    is relevant to our structured output needs in routing classifiers. GEPA
    (arxiv 2507.19457, ICLR 2026 Oral) outperforms GRPO by 6% avg with 35x
    fewer rollouts — could be valuable for optimizing our routing prompts.

