- id: intake-233
  source_type: field_report
  title: 'Nemotron-Cascade 2 vs Qwen3.5-35B-A3B: Mamba2 vs Delta Net RTX 3090 Benchmark'
  reported_by: colleague
  categories:
  - ssm_hybrid
  - inference_speed
  - architecture_comparison
  - gpu_inference
  key_claims:
  - Nemotron-Cascade 2 (Mamba2 30B-A3B) achieves 187 t/s flat from 4K to 625K context on RTX 3090
  - Qwen3.5-35B-A3B (Delta Net) achieves 112 t/s flat from 4K to 262K on same RTX 3090
  - Mamba2 is 67% faster than Delta Net at same active parameter count on same hardware
  - Nemotron needs only -ngl 99 -np 1, auto-allocates 625K context with no KV cache flags
  - Qwen3.5 needs KV cache quantization (q8_0) to fit 262K context in 24GB VRAM
  - Both architectures show flat (context-independent) generation speed — zero speed loss at long context
  - Nemotron-Cascade 2 is gold medal winner at IMO 2025, IOI 2025, ICPC World Finals 2025
  techniques:
  - Mamba2-Transformer hybrid MoE (Nemotron architecture)
  - Delta Net gated linear attention hybrid MoE (Qwen3.5 architecture)
  - KV cache quantization (q8_0 for Delta Net to fit long context)
  reported_results:
  - 'Nemotron-Cascade 2: 187 t/s, flat 4K-625K, RTX 3090, -ngl 99 -np 1'
  - 'Qwen3.5-35B-A3B: 112 t/s, flat 4K-262K, RTX 3090, -ngl 99 -np 1 -c 262144 --cache-type-k q8_0 --cache-type-v q8_0'
  - 'Delta difference: 67% speed advantage for Mamba2 at same active params'
  - 'Nemotron IMO 2025: 35pts (Gold), AIME 2025: 92.4, IOI 2025: 439.3 (Gold)'
  novelty: high
  relevance: high
  verdict: new_opportunity
  discovered_via: field_report
  ingested_date: '2026-03-28'
  cross_references:
    handoffs:
    - ssm-hybrid-acceleration.md
    - tree-speculation-numa-drafting.md
    - dynamic-stack-concurrency.md
    - inference-acceleration-index.md
  notes: >
    Critical architecture comparison. Our production worker is Qwen3.5-35B-A3B
    (Delta Net). Nemotron-Cascade 2 uses Mamba2 (same 30B MoE, 3B active) and
    is 67% faster on GPU. On our EPYC CPU stack the comparison may differ
    (recurrent state overhead matters more on CPU), but this signals Mamba2
    may be the superior SSM variant for inference speed. Released 2026-03-19
    (arxiv 2603.19220). Key question: does llama.cpp support Mamba2 MoE yet?
    If not, this is GPU-only for now. Also: Nemotron's quality scores (IMO gold,
    AIME 92.4) significantly exceed our 35B-A3B benchmarks.

