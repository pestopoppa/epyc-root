# -----------------------------------------------------------------------------
# Migration checklist — when v5 ships
# -----------------------------------------------------------------------------
migration:
  - step: Validate canonical recipe reproduces ~47-49 t/s tripwire on production-consolidated-v5 cold-boot
  - step: For each role above, smoke + bench under documented env block, confirm expected_throughput
  - step: For each todo_or_undecided role, run canonical baseline + 3-config probe (c0/c2/c3) before shipping
  - step: Merge env blocks into model_registry.yaml under each role; preserve existing runtime_quirks descriptions
  - step: Update orchestrator_stack.py to apply host_prerequisites at session start (not per-launch)
  - step: Add reproducibility_tripwire as a startup health-check before any role launches
  - step: Move this file to handoffs/completed/ once production model_registry.yaml is updated
